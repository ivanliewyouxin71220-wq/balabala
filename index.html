<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivan Webpages</title>

<style>
:root{
    --main-color:#00bcd4;
    --second-color:#004d60;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background:linear-gradient(135deg,var(--main-color),var(--second-color));
    overflow-x:hidden;
    transition:0.6s;
}

h1{
    text-align:center;
    padding-top:40px;
    font-size:40px;
}

section{
    padding:40px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:rgba(0,0,0,0.35);
    padding:25px;
    border-radius:15px;
    margin-bottom:40px;
    backdrop-filter:blur(6px);
}

button{
    position:fixed;
    top:20px;
    left:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    z-index:3;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.slider{
    position:relative;
    width:100%;
    height:400px;
    overflow:hidden;
    border-radius:15px;
    margin-top:20px;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

.nextBtn{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<button onclick="randomTheme()">Random Theme</button>
<canvas id="canvas"></canvas>

<h1>The Webpage From Ivan</h1>

<section>

<div class="card">
<h2>Interest</h2>
<p>
One of my main interests is listening to music and playing different online games.
I enjoy games such as Roblox, Genshin Impact and Honkai Star Rail.
</p>
</div>

<div class="card">
<h2>Game Gallery</h2>

<div class="slider">
<img id="slideImage" src="e678ce3bbdc58d47c59cc2233f001272_6590599481852303558.png">
<div class="overlay">
<p id="caption">Genshin Impact city scenery</p>
<button class="nextBtn" onclick="nextSlide()">Next Image</button>
</div>
</div>

</div>

</section>

<script>

function randomTheme(){
    function randomColor(){
        return "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    }
    document.documentElement.style.setProperty('--main-color',randomColor());
    document.documentElement.style.setProperty('--second-color',randomColor());
}

const images=[
["e678ce3bbdc58d47c59cc2233f001272_6590599481852303558.png","Genshin Impact city scenery"],
["e9e7d0b2c4bb49a783c910c0b05c6184.png","Honkai Star Rail cutscene"],
["1771047763606.jpg.jpeg","Honkai Star Rail battle scene"],
["d331d3189256277.65a8b8bbcde24.png","Honkai Star Rail characters"],
["E3ClS8eVIAAbAv1.jpg.jpeg","Genshin Impact characters"],
["am-i-the-only-one-that-thinks-doors-is-the-most-v0-4sanbolynvgd1.png","Roblox DOORS corridor"],
["3fab4f60-4d1c-11f0-8c47-237c2e4015f5.jpg","Roblox Grow a Garden"],
["ff44557751a432906d5277b56a773be7.jpg","Genshin Impact character"]
];

let index=0;

function nextSlide(){
    index++;
    if(index>=images.length){index=0;}
    document.getElementById("slideImage").src=images[index][0];
    document.getElementById("caption").innerText=images[index][1];
}

setInterval(nextSlide,4000);

</script>

</body>
</html>
